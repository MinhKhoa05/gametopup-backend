version: "3.9"

services:
  # Database Service (Luôn luôn chạy khi docker compose up)
  db:
    image: mariadb:11
    container_name: game_topup_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT_EXTERNAL:-3307}:${DB_PORT_INTERNAL:-3306}"
    volumes:
      - db_data:/var/lib/mysql
      - ./Database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./Database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # API Service (Chỉ chạy khi chỉ định profile 'api' hoặc 'full')
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: game_topup_api
    restart: unless-stopped
    profiles:
      - api
      - full
    ports:
      - "${API_PORT_EXTERNAL:-5000}:${API_PORT_INTERNAL:-8080}"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=http://+:${API_PORT_INTERNAL:-8080}
      # Lưu ý: Trong mạng Docker, server phải là tên service 'db'
      - DB_CONNECTION_STRING=server=db;port=${DB_PORT_INTERNAL:-3306};database=${DB_NAME};user=${DB_USER};password=${DB_PASSWORD};SslMode=None;
      - JWT_KEY=${JWT_KEY}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
